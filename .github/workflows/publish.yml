name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (skip actual publish)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  id-token: write  # Required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Determine tag
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Always publish as latest (even for pre-release) until a stable release exists
          echo "dist_tag=latest" >> "$GITHUB_OUTPUT"

      - name: Publish (dry run)
        if: ${{ github.event.inputs.dry-run == 'true' }}
        run: npm publish --tag ${{ steps.tag.outputs.dist_tag }} --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: ${{ github.event.inputs.dry-run != 'true' }}
        run: npm publish --tag ${{ steps.tag.outputs.dist_tag }} --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "## 📦 Published to npm" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Package:** swallowkit" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.tag.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** ${{ steps.tag.outputs.dist_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Provenance:** ✅" >> "$GITHUB_STEP_SUMMARY"
